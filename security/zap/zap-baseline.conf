# =============================================================================
# ZAP Passive Scan Configuration
# =============================================================================
# Controls which passive scan rules are enabled and at what threshold.
# Format: <rule_id> = <action>
#   WARN  = report finding
#   FAIL  = report as critical finding
#   IGNORE = suppress rule
#   INFO  = informational only
#
# Reference: https://www.zaproxy.org/docs/alerts/
# =============================================================================

# -- OWASP Top 10 Passive Rules -----------------------------------------------

# A01:2021 - Broken Access Control
10035 = WARN    # Strict-Transport-Security Header Not Set
10037 = WARN    # Server Leaks Information via X-Powered-By Header

# A02:2021 - Cryptographic Failures
10096 = WARN    # Timestamp Disclosure
10027 = WARN    # Information Disclosure - Suspicious Comments

# A03:2021 - Injection
40014 = FAIL    # Cross Site Scripting (Persistent)
40012 = FAIL    # Cross Site Scripting (Reflected)
40018 = FAIL    # SQL Injection

# A04:2021 - Insecure Design
90033 = WARN    # Loosely Scoped Cookie

# A05:2021 - Security Misconfiguration
10010 = WARN    # Cookie No HttpOnly Flag
10011 = WARN    # Cookie Without Secure Flag
10015 = WARN    # Incomplete or No Cache-control and Pragma HTTP Header
10017 = WARN    # Cross-Domain JavaScript Source File Inclusion
10019 = WARN    # Content-Type Header Missing
10020 = WARN    # X-Frame-Options Header
10021 = WARN    # X-Content-Type-Options Header Missing
10036 = WARN    # Server Leaks Version Information
10038 = WARN    # Content Security Policy (CSP) Header Not Set
10049 = WARN    # Storable and Cacheable Content
10050 = WARN    # Retrieved from Cache
10054 = WARN    # Cookie without SameSite Attribute
10055 = WARN    # CSP Wildcard Directive
10063 = WARN    # Feature Policy Header Not Set (Permissions-Policy)
90003 = WARN    # Sub Resource Integrity Attribute Missing

# A06:2021 - Vulnerable and Outdated Components
10043 = WARN    # User Controllable HTML Element Attribute

# A07:2021 - Identification and Authentication Failures
10023 = WARN    # Information Disclosure - Debug Error Messages
10062 = WARN    # PII Disclosure

# A08:2021 - Software and Data Integrity Failures
10029 = WARN    # Cookie Poisoning

# A09:2021 - Security Logging and Monitoring Failures
10052 = WARN    # X-ChromeLogger-Data Header Found
10056 = WARN    # X-Debug-Token Information Leak

# A10:2021 - Server-Side Request Forgery (SSRF)
40046 = FAIL    # Server Side Request Forgery

