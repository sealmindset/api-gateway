# =============================================================================
# Docker Compose - API Gateway (Local Development)
# =============================================================================
# Brings up the full API Gateway stack for local development:
#   - Kong Gateway (API proxy with custom plugins)
#   - PostgreSQL 16 (Kong DB + Admin Panel DB)
#   - Redis 7 (rate limiting + session cache)
#   - Admin Panel (FastAPI with hot reload)
#   - Prometheus (metrics collection)
#   - Grafana (dashboards and visualization)
#   - Cribl Stream (log routing, community edition)
#
# Usage:
#   cp .env.example .env          # Configure environment
#   docker compose up -d          # Start all services
#   docker compose logs -f kong   # Follow Kong logs
#
# Or use the setup script:
#   ./scripts/setup-local.sh
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 - Primary database for Kong and Admin Panel
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: api-gw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_local_dev}
      POSTGRES_DB: postgres
      # Passed to init.sh for user creation with matching passwords
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong_local_dev}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      ADMIN_DB_USER: ${ADMIN_DB_USER:-api_gateway_admin}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:-admin_local_dev}
      ADMIN_DB_NAME: ${ADMIN_DB_NAME:-api_gateway_admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 - Rate limiting backend and session cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: api-gw-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_local_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_local_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kong Migrations - Run database migrations before Kong starts
  # ---------------------------------------------------------------------------
  kong-migrations:
    build:
      context: ./kong
      dockerfile: Dockerfile
    container_name: api-gw-kong-migrations
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong_local_dev}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api-gateway-net
    restart: on-failure

  # ---------------------------------------------------------------------------
  # Kong Gateway - API proxy and gateway
  # ---------------------------------------------------------------------------
  kong:
    build:
      context: ./kong
      dockerfile: Dockerfile
    container_name: api-gw-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD:-kong_local_dev}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      # Proxy listeners
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      # Admin API listener (local dev only - never expose in prod)
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      # Logging
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      # Plugins
      KONG_PLUGINS: "bundled,subscription-validator,ai-gateway"
      # Prometheus metrics
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
      # DNS resolver for service discovery
      KONG_DNS_RESOLVER: ""
      KONG_DNS_ORDER: "LAST,A,SRV"
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"      # Proxy HTTP
      - "${KONG_PROXY_SSL_PORT:-8443}:8443"  # Proxy HTTPS
      - "${KONG_ADMIN_PORT:-8001}:8001"      # Admin API
      - "${KONG_STATUS_PORT:-8100}:8100"      # Prometheus metrics
    depends_on:
      kong-migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Admin Panel - FastAPI application for managing subscribers and API keys
  # ---------------------------------------------------------------------------
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      target: development
    container_name: api-gw-admin-panel
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      # Database
      DATABASE_URL: "postgresql://${ADMIN_DB_USER:-api_gateway_admin}:${ADMIN_DB_PASSWORD:-admin_local_dev}@postgres:5432/${ADMIN_DB_NAME:-api_gateway_admin}"
      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD:-redis_local_dev}@redis:6379/0"
      # Kong Admin API
      KONG_ADMIN_URL: "http://kong:8001"
      # Auth
      SECRET_KEY: ${SECRET_KEY:-local-dev-secret-key-change-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      # AI / Claude -- defaults to Azure AI Foundry; set AI_PROVIDER=claude for direct API
      AI_PROVIDER: ${AI_PROVIDER:-anthropic_foundry}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-cogdep-aifoundry-dev-eus2-claude-sonnet-4-5}
      AZURE_AI_FOUNDRY_ENDPOINT: ${AZURE_AI_FOUNDRY_ENDPOINT:-}
      AZURE_AI_FOUNDRY_API_KEY: ${AZURE_AI_FOUNDRY_API_KEY:-}
      AI_MAX_COST_PER_ANALYSIS: ${AI_MAX_COST_PER_ANALYSIS:-0.50}
      AI_SAMPLING_RATE: ${AI_SAMPLING_RATE:-0.1}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      # Hot reload: mount source code
      - ./admin-panel/app:/app/app:cached
      - ./admin-panel/tests:/app/tests:cached
    ports:
      - "${ADMIN_PANEL_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kong:
        condition: service_healthy
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: api-gw-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./monitoring/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Grafana - Dashboards and visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: api-gw-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${GRAFANA_PORT:-3000}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Cribl Stream - Log routing and processing (Community Edition)
  # ---------------------------------------------------------------------------
  cribl:
    image: cribl/cribl:4.5.0
    container_name: api-gw-cribl
    restart: unless-stopped
    environment:
      CRIBL_DIST_MODE: single
    volumes:
      - cribl_data:/opt/cribl/state
      - ./monitoring/cribl/local:/opt/cribl/local:ro
    ports:
      - "${CRIBL_PORT:-9420}:9420"        # Cribl UI
      - "${CRIBL_SYSLOG_PORT:-5140}:5140" # Syslog input
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9420/api/v1/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# Volumes - Named volumes for data persistence across restarts
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  cribl_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  api-gateway-net:
    driver: bridge
    name: api-gateway-net
