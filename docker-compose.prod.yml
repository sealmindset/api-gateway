# =============================================================================
# Docker Compose - Production Overrides
# =============================================================================
# Production-specific overrides for the API Gateway stack.
# No exposed ports (services accessed via ingress/load balancer),
# resource limits, restart policies, and hardened configuration.
#
# Usage (typically handled by CI/CD, not run manually):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Production overrides
  # ---------------------------------------------------------------------------
  postgres:
    restart: always
    ports: []  # No exposed ports in production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis - Production overrides
  # ---------------------------------------------------------------------------
  redis:
    restart: always
    ports: []  # No exposed ports
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-backlog 511
      --timeout 300
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Kong - Production overrides
  # ---------------------------------------------------------------------------
  kong:
    image: ${ACR_REGISTRY}/api-gateway/kong:${IMAGE_TAG}
    restart: always
    ports: []  # Accessed via Kubernetes service / ingress
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_PORT: 5432
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      # Proxy listeners - HTTPS only in production
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl http2"
      # Admin API - internal only, no SSL listener exposed
      KONG_ADMIN_LISTEN: "127.0.0.1:8001"
      # Production logging - JSON format for structured logging
      KONG_LOG_LEVEL: warn
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: "off"
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      # Plugins
      KONG_PLUGINS: "bundled,custom-auth,subscriber-rate-limit"
      # Prometheus metrics
      KONG_STATUS_LISTEN: "0.0.0.0:8100"
      # Performance tuning
      KONG_NGINX_WORKER_PROCESSES: auto
      KONG_UPSTREAM_KEEPALIVE_POOL_SIZE: 128
      KONG_NGINX_HTTP_LUA_SHARED_DICT: "prometheus_metrics 32m"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    volumes: []  # No host mounts in production

  # ---------------------------------------------------------------------------
  # Kong Migrations - Production overrides
  # ---------------------------------------------------------------------------
  kong-migrations:
    image: ${ACR_REGISTRY}/api-gateway/kong:${IMAGE_TAG}
    environment:
      KONG_PG_HOST: ${KONG_PG_HOST}
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}

  # ---------------------------------------------------------------------------
  # Admin Panel - Production overrides
  # ---------------------------------------------------------------------------
  admin-panel:
    image: ${ACR_REGISTRY}/api-gateway/admin-panel:${IMAGE_TAG}
    restart: always
    ports: []  # Accessed via Kubernetes service / ingress
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: "postgresql://${ADMIN_DB_USER}:${ADMIN_DB_PASSWORD}@${ADMIN_DB_HOST}:5432/${ADMIN_DB_NAME}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@${REDIS_HOST}:6379/0"
      KONG_ADMIN_URL: "http://kong:8001"
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes: []  # No hot reload mounts in production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Prometheus - Production overrides
  # ---------------------------------------------------------------------------
  prometheus:
    restart: always
    ports: []  # Accessed internally
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-lifecycle"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Grafana - Production overrides
  # ---------------------------------------------------------------------------
  grafana:
    restart: always
    ports: []  # Accessed via ingress
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
      GF_LOG_MODE: console
      GF_LOG_LEVEL: warn
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Cribl Stream - Production overrides
  # ---------------------------------------------------------------------------
  cribl:
    restart: always
    ports: []  # Accessed internally
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"
