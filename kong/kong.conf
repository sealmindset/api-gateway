# =============================================================================
# Kong Gateway Configuration
# =============================================================================
# Production configuration for Kong Community Edition 3.9.x
#
# This file is loaded at startup via the KONG_CONF environment variable or
# by placing it at /etc/kong/kong.conf. Values here can be overridden by
# environment variables using the KONG_ prefix (e.g., KONG_PG_HOST).
#
# Reference: https://docs.konghq.com/gateway/latest/reference/configuration/
# =============================================================================

# =============================================================================
# GENERAL
# =============================================================================

# Prefix directory for runtime files (logs, pids, sockets)
prefix = /usr/local/kong

# Log verbosity: debug, info, notice, warn, error, crit
log_level = info

# Comma-separated list of custom plugin names to load. The "bundled" keyword
# loads all plugins shipped with Kong. Append custom plugins after "bundled".
plugins = bundled,subscription-validator,ai-gateway

# =============================================================================
# DATABASE
# =============================================================================
# Kong supports PostgreSQL ("postgres") or declarative DB-less mode ("off").
# DB mode is required for OAuth2 token management, consumer CRUD via Admin API,
# and runtime plugin configuration changes.

database = postgres

# PostgreSQL connection parameters. Override these via environment variables
# in production (KONG_PG_HOST, KONG_PG_PASSWORD, etc.) to avoid storing
# credentials in configuration files.
pg_host = kong-database
pg_port = 5432
pg_user = kong
pg_password = kong
pg_database = kong
pg_timeout = 5000

# Connection pool settings - tune based on expected concurrency
pg_max_concurrent_queries = 0
pg_semaphore_timeout = 60000

# SSL for PostgreSQL connections. Enable in production when the database
# requires encrypted connections.
# pg_ssl = on
# pg_ssl_verify = on

# =============================================================================
# DECLARATIVE CONFIGURATION (DB-less fallback)
# =============================================================================
# When database = off, Kong loads its configuration from this YAML file.
# Uncomment if switching to DB-less mode.
# declarative_config = /etc/kong/kong.yml

# =============================================================================
# PROXY LISTENERS
# =============================================================================
# The proxy listeners handle client-facing API traffic. In production, TLS
# should always be enabled with valid certificates.

# HTTP listener on port 8000. In production, consider redirecting to HTTPS
# or disabling entirely if all traffic must be encrypted.
proxy_listen = 0.0.0.0:8000 reuseport backlog=16384, 0.0.0.0:8443 http2 ssl reuseport backlog=16384

# SSL certificate and key for the proxy. Replace with actual certificate paths
# in production. Kong ships with a self-signed certificate for development.
ssl_cert = /etc/kong/ssl/server.crt
ssl_cert_key = /etc/kong/ssl/server.key

# SSL protocols and ciphers - restrict to modern, secure options
ssl_protocols = TLSv1.2 TLSv1.3
ssl_prefer_server_ciphers = on
ssl_ciphers = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384

# =============================================================================
# ADMIN API LISTENERS
# =============================================================================
# The Admin API provides full control over Kong's configuration. It MUST NOT
# be exposed to untrusted networks. Bind to localhost only, or use a private
# network interface.

admin_listen = 127.0.0.1:8001 reuseport backlog=16384, 127.0.0.1:8444 http2 ssl reuseport backlog=16384

# Admin API SSL configuration (uses the same certificate as proxy by default)
admin_ssl_cert = /etc/kong/ssl/server.crt
admin_ssl_cert_key = /etc/kong/ssl/server.key

# =============================================================================
# STATUS LISTENER
# =============================================================================
# The status endpoint exposes health check and Prometheus metrics endpoints.
# This should be accessible to monitoring infrastructure but not to the public.

status_listen = 0.0.0.0:8100

# =============================================================================
# DNS RESOLVER
# =============================================================================
# Configure DNS resolution for upstream service discovery. In Kubernetes or
# Docker Compose, this typically points to the internal DNS resolver.

# dns_resolver: Leave unset to use the system/container DNS resolver.
# In Docker Compose, the embedded DNS (127.0.0.11) is used automatically.
# In Kubernetes, CoreDNS handles resolution. Only set this if you need
# a custom resolver.
# dns_resolver = 127.0.0.11:53
dns_order = LAST,A,SRV,CNAME
dns_valid_ttl = 30
dns_stale_ttl = 4
dns_not_found_ttl = 1
dns_error_ttl = 1
dns_no_sync = off

# =============================================================================
# NGINX TUNING
# =============================================================================
# These settings control the underlying Nginx worker processes. Tune based
# on available CPU cores and expected concurrency.

# Auto-detect CPU cores for worker process count
nginx_worker_processes = auto

# Maximum number of simultaneous connections per worker
# Raise if handling high concurrency (default: 16384)
# nginx_events_worker_connections = 16384

# Client request body size limit (default: 0 = unlimited in Kong)
client_max_body_size = 16m

# Client request header buffer size
client_body_buffer_size = 8k

# =============================================================================
# UPSTREAM KEEPALIVE
# =============================================================================
# Connection pooling to upstream services reduces latency from repeated
# TCP handshakes and TLS negotiations.

upstream_keepalive_pool_size = 256
upstream_keepalive_max_requests = 10000
upstream_keepalive_idle_timeout = 60

# =============================================================================
# ERROR HANDLING
# =============================================================================
# Control how Kong handles various error conditions.

# Return a Kong-formatted error page instead of Nginx defaults
# enabled_headers = server_tokens, latency_tokens, X-Kong-Response-Latency, Via

# =============================================================================
# TRACING & OBSERVABILITY
# =============================================================================
# Headers to trust from downstream load balancers / proxies.

trusted_ips = 0.0.0.0/0,::/0
real_ip_header = X-Forwarded-For
real_ip_recursive = on

# =============================================================================
# ANONYMOUS REPORTS
# =============================================================================
# Disable anonymous usage reporting to Kong Inc.

anonymous_reports = off
