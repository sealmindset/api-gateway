apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: api-gateway

namePrefix: staging-

commonLabels:
  environment: staging

resources:
  - ../../base

patches:
  # Kong: 2 replicas, moderate resources
  - target:
      kind: Deployment
      name: kong
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kong
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: kong
                resources:
                  requests:
                    cpu: 250m
                    memory: 384Mi
                  limits:
                    cpu: "1"
                    memory: 1Gi

  # Admin panel: 1 replica, moderate resources
  - target:
      kind: Deployment
      name: admin-panel
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: admin-panel
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: admin-panel
                resources:
                  requests:
                    cpu: 125m
                    memory: 192Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi

  # PDB: minAvailable 1 for staging
  - target:
      kind: PodDisruptionBudget
      name: kong-pdb
    patch: |
      apiVersion: policy/v1
      kind: PodDisruptionBudget
      metadata:
        name: kong-pdb
      spec:
        minAvailable: 1
